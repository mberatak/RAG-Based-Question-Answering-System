services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: rag-qa-system:latest
    container_name: rag-qa-app
    ports:
      - "8501:8501"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gemini-2.5-flash}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-gemini-embedding-001}
      - TEMPERATURE=${TEMPERATURE:-0.3}
      - CHUNK_SIZE=${CHUNK_SIZE:-1000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-200}
      - CHUNK_STRATEGY=${CHUNK_STRATEGY:-recursive}
      - TOP_K=${TOP_K:-5}
      - VECTOR_DB=${VECTOR_DB:-faiss}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./documents:/app/documents          # Kullanıcı belgeleri
      - ./index:/app/index                  # Vektör indeksi (kalıcı)
      - ./cache:/app/cache                  # Sorgu önbelleği (kalıcı)
      - ./logs:/app/logs                    # Log dosyaları
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
